<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Design C — Zen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f6f3ec; --paper2:#fbf9f4; --ink:#23211c; --ink2:#6c6960;
    --line:#e4dfd3; --sage:#5b7461; --sage-d:#46594c; --gold:#9a7b3f;
    --red:#b4452f; --blue:#3a5a8c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -20%, #fffdf8 0%, rgba(255,253,248,0) 55%),
      var(--paper);
    min-height:100%;
  }
  .serif{font-family:'Fraunces',Georgia,serif;}
  .wrap{max-width:430px; margin:0 auto; padding:0 26px 110px; min-height:100%;}

  header{display:flex; align-items:center; justify-content:space-between; padding:22px 0 8px;}
  header .brand{font-family:'Fraunces'; font-weight:600; font-size:19px; letter-spacing:.2px;}
  header .brand i{font-style:normal; color:var(--sage);}
  header .me{width:30px;height:30px;border-radius:50%; background:var(--sage); color:#fff; display:grid; place-items:center; font-size:12px; font-weight:600;}

  /* thin progress line */
  .progress{margin:14px 0 26px;}
  .progress .meta{display:flex; justify-content:space-between; font-size:12px; color:var(--ink2); margin-bottom:7px; letter-spacing:.02em;}
  .progress .track{height:3px; background:var(--line); border-radius:2px; overflow:hidden;}
  .progress .fill{height:100%; width:71%; background:var(--sage); border-radius:2px;}

  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink2); text-align:center;}
  .scene{text-align:center; margin-top:8px;}

  /* community cards */
  .board{display:flex; gap:10px; justify-content:center; margin:22px 0 6px;}
  .pc{
    width:50px; height:70px; border-radius:8px; background:var(--paper2);
    border:1px solid var(--line); box-shadow:0 2px 0 rgba(35,33,28,.04), 0 8px 20px rgba(35,33,28,.06);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  }
  .pc .r{font-family:'Fraunces'; font-weight:500; font-size:24px; line-height:1;}
  .pc .s{font-size:16px; line-height:1;}
  .sp{color:#2a2722;} .he{color:var(--red);} .di{color:var(--blue);} .cl{color:var(--sage-d);}
  .boardlbl{font-size:12px; color:var(--ink2); letter-spacing:.04em;}

  .divider{display:flex; align-items:center; gap:14px; margin:26px 0;}
  .divider::before,.divider::after{content:""; height:1px; background:var(--line); flex:1;}
  .divider span{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink2);}

  /* your hand */
  .your{display:flex; gap:12px; justify-content:center;}
  .your .pc{width:64px; height:90px;}
  .your .pc .r{font-size:30px;}
  .your .pc .s{font-size:20px;}

  .holding{text-align:center; margin-top:14px;}
  .holding .h{font-family:'Fraunces'; font-weight:500; font-size:26px; letter-spacing:.2px;}
  .holding .sub{color:var(--ink2); font-size:15px; margin-top:4px; line-height:1.5;}

  /* question + actions */
  .question{font-family:'Fraunces'; font-weight:500; font-size:20px; text-align:center; margin:30px 0 20px; color:var(--ink);}
  .actions{display:flex; flex-direction:column; gap:12px;}
  .btn{
    border:1px solid var(--line); background:var(--paper2); border-radius:14px; padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
    font-size:17px; font-weight:500; color:var(--ink); transition:.15s;
  }
  .btn .meta{font-size:13px; color:var(--ink2); font-weight:400;}
  .btn:hover{border-color:#cfc8b8;}
  .btn.primary{background:var(--sage); border-color:var(--sage); color:#fff;}
  .btn.primary .meta{color:rgba(255,255,255,.8);}

  nav{
    position:fixed; bottom:0; left:0; right:0; max-width:430px; margin:0 auto;
    border-top:1px solid var(--line); background:rgba(246,243,236,.9); backdrop-filter:blur(10px);
    display:flex; justify-content:space-around; padding:12px 0 calc(12px + env(safe-area-inset-bottom));
  }
  nav a{font-size:12px; color:var(--ink2); text-decoration:none; letter-spacing:.04em; display:flex; flex-direction:column; align-items:center; gap:5px;}
  nav a .ic{font-size:17px; opacity:.7;}
  nav a.on{color:var(--ink);}
  nav a.on .ic{opacity:1;}
  nav a.on{font-weight:600;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">Leak<i>·</i>Tutor</div>
      <div class="me">DW</div>
    </header>

    <div class="progress">
      <div class="meta"><span>Today's session</span><span>17 of 24 · 71%</span></div>
      <div class="track"><div class="fill"></div></div>
    </div>

    <div class="eyebrow">Button vs Big Blind · single-raised pot</div>

    <div class="scene">
      <div class="board">
        <div class="pc"><span class="r sp">Q</span><span class="s sp">♠</span></div>
        <div class="pc"><span class="r he">7</span><span class="s he">♥</span></div>
        <div class="pc"><span class="r cl">2</span><span class="s cl">♣</span></div>
      </div>
      <div class="boardlbl">The flop · Big blind checks to you</div>
    </div>

    <div class="divider"><span>your hand</span></div>

    <div class="your">
      <div class="pc"><span class="r sp">A</span><span class="s sp">♠</span></div>
      <div class="pc"><span class="r di">Q</span><span class="s di">♦</span></div>
    </div>
    <div class="holding">
      <div class="h">Top pair, top kicker</div>
      <div class="sub">A strong made hand on a dry board.<br/>Few draws threaten you here.</div>
    </div>

    <div class="question">Do you bet, or check back?</div>

    <div class="actions">
      <button class="btn primary">Bet 33% <span class="meta">value &amp; protection</span></button>
      <button class="btn">Check <span class="meta">keep the pot small</span></button>
    </div>
  </div>

  <nav>
    <a class="on"><span class="ic">◗</span>Practice</a>
    <a><span class="ic">◔</span>Insights</a>
    <a><span class="ic">⌃</span>Import</a>
    <a><span class="ic">❀</span>Learn</a>
  </nav>
</body>
</html>
