<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Design A — Rush</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #2a1a4a;
    --pink: #ff4d8d; --pink-d: #d62e6e;
    --grn: #3ddc97; --grn-d: #1fb87a;
    --yel: #ffd23f; --yel-d: #f0b400;
    --vio: #7c5cff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 70% at 50% -10%, #b69bff 0%, rgba(182,155,255,0) 50%),
      linear-gradient(180deg, #efe7ff 0%, #ffe9f2 55%, #fff6e6 100%);
    min-height: 100%;
    overflow-x: hidden;
  }
  .wrap { max-width: 440px; margin: 0 auto; padding: 14px 16px 100px; }

  /* top HUD */
  .hud { display: flex; align-items: center; gap: 10px; }
  .ring {
    --p: 72;
    width: 56px; height: 56px; border-radius: 50%;
    background: conic-gradient(var(--grn) calc(var(--p) * 1%), #e7defb 0);
    display: grid; place-items: center; flex: none;
    box-shadow: 0 6px 0 #d9cdf5, 0 10px 18px rgba(124,92,255,.25);
  }
  .ring > div { width: 42px; height: 42px; border-radius: 50%; background: #fff; display: grid; place-items: center; font-family: 'Baloo 2'; font-weight: 800; color: var(--vio); font-size: 13px; line-height: 1; }
  .ring small { display:block; font-size: 8px; color:#9b8bc0; letter-spacing:.5px; }
  .pill {
    flex: 1; display: flex; gap: 8px;
  }
  .stat {
    flex: 1; background: #fff; border-radius: 18px; padding: 8px 10px;
    box-shadow: 0 5px 0 #ecdff7, 0 8px 16px rgba(124,92,255,.12);
    display: flex; align-items: center; gap: 7px;
  }
  .stat .emoji { font-size: 20px; }
  .stat b { font-family:'Baloo 2'; font-size: 18px; line-height:1; }
  .stat span { font-size: 11px; color:#9b8bc0; font-weight:800; display:block; }

  /* spot card */
  .card {
    margin-top: 16px; background: #fff; border-radius: 30px; padding: 18px 16px 20px;
    box-shadow: 0 10px 0 #ecdff7, 0 20px 40px rgba(124,92,255,.18);
    position: relative; overflow: hidden;
  }
  .card::before { content:""; position:absolute; inset:0 0 auto 0; height:90px; background: linear-gradient(180deg,#7c5cff,#9a7bff); border-radius:30px 30px 40px 40px; }
  .badge { position: relative; display:flex; justify-content:space-between; align-items:center; color:#fff; }
  .badge .tag { background: rgba(255,255,255,.22); border:2px solid rgba(255,255,255,.35); border-radius:999px; padding:5px 12px; font-family:'Baloo 2'; font-weight:700; font-size:13px; }
  .badge .pot { font-family:'Baloo 2'; font-weight:800; font-size:14px; }

  .felt {
    position: relative; margin: 14px 6px 0; border-radius: 26px; height: 150px;
    background: radial-gradient(circle at 50% 35%, #41d39a, #1fae7e);
    border: 6px solid #169c6c;
    box-shadow: inset 0 4px 12px rgba(0,0,0,.18);
    display: grid; place-items: center;
  }
  .board { display:flex; gap:7px; }
  .pc {
    width: 40px; height: 56px; border-radius: 9px; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Baloo 2'; font-weight:800; box-shadow: 0 4px 8px rgba(0,0,0,.25);
  }
  .pc .r { font-size: 20px; line-height:1; }
  .pc .s { font-size: 17px; line-height:1; }
  .sp { color:#1b1230; } .he { color:#ff3b6b; } .di { color:#2f6bff; } .cl { color:#15b46b; }
  .villain { position:absolute; top:8px; right:14px; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .vchip { background:#ffeb99; color:#7a5c00; font-family:'Baloo 2'; font-weight:800; font-size:11px; padding:3px 9px; border-radius:999px; box-shadow:0 3px 0 #e7c95f; }
  .back { width:24px; height:34px; border-radius:6px; background: repeating-linear-gradient(45deg,#5b3df0,#5b3df0 3px,#7c5cff 3px,#7c5cff 6px); border:2px solid #fff; box-shadow:0 3px 6px rgba(0,0,0,.3); }

  .hero { display:flex; justify-content:center; gap:10px; margin-top:-26px; position:relative; z-index:2; }
  .hero .pc { width: 64px; height: 90px; border-radius:14px; box-shadow: 0 10px 18px rgba(0,0,0,.25); }
  .hero .pc:first-child { transform: rotate(-7deg); }
  .hero .pc:last-child { transform: rotate(7deg); }
  .hero .pc .r { font-size: 30px; } .hero .pc .s { font-size: 26px; }

  .q { text-align:center; margin: 16px 6px 4px; font-family:'Baloo 2'; font-weight:700; font-size:18px; color:var(--ink); }
  .qs { text-align:center; color:#9b8bc0; font-weight:800; font-size:12px; margin-bottom:4px; }

  /* actions */
  .acts { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px; }
  .btn {
    border:none; border-radius:22px; padding:18px 10px; font-family:'Baloo 2'; font-weight:800; font-size:22px; color:#fff;
    cursor:pointer; position:relative; transition: transform .05s;
  }
  .btn small { display:block; font-size:11px; font-weight:700; opacity:.8; margin-top:2px; }
  .btn.check { background: linear-gradient(180deg,#9aa6c4,#7d87aa); box-shadow:0 7px 0 #5f678a; color:#fff; }
  .btn.bet { background: linear-gradient(180deg,#46e6a3,#22c781); box-shadow:0 7px 0 var(--grn-d); }
  .btn:active { transform: translateY(4px); }

  /* streak chips row */
  .chips { display:flex; gap:8px; justify-content:center; margin-top:16px; }
  .schip { width:14px;height:14px;border-radius:50%; background:#e7defb; box-shadow: inset 0 -2px 0 #d6c8f2; }
  .schip.on { background: var(--yel); box-shadow: 0 3px 0 var(--yel-d); }

  /* nav */
  nav {
    position: fixed; left:0; right:0; bottom:0; height: 78px;
    background:#fff; border-radius: 28px 28px 0 0;
    box-shadow: 0 -8px 24px rgba(124,92,255,.15);
    display:flex; align-items:center; justify-content:space-around; padding: 6px 14px env(safe-area-inset-bottom);
    max-width:440px; margin:0 auto;
  }
  nav a { display:flex; flex-direction:column; align-items:center; gap:3px; font-weight:900; font-size:11px; color:#b7a8d8; text-decoration:none; }
  nav a .ic { font-size:22px; }
  nav a.active { color: var(--vio); }
  nav a.active .ic { transform: translateY(-2px) scale(1.15); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="ring" style="--p:72"><div>L7<small>LEVEL</small></div></div>
      <div class="pill">
        <div class="stat"><span class="emoji">🔥</span><div><b>12</b><span>STREAK</span></div></div>
        <div class="stat"><span class="emoji">💎</span><div><b>1,480</b><span>XP</span></div></div>
      </div>
    </div>

    <div class="card">
      <div class="badge">
        <span class="tag">🎯 Postflop · BTN vs BB</span>
        <span class="pot">POT 5.5bb</span>
      </div>

      <div class="felt">
        <div class="villain">
          <div class="back"></div>
          <div class="vchip">BB checks</div>
        </div>
        <div class="board">
          <div class="pc"><span class="r sp">Q</span><span class="s sp">♠</span></div>
          <div class="pc"><span class="r he">7</span><span class="s he">♥</span></div>
          <div class="pc"><span class="r cl">2</span><span class="s cl">♣</span></div>
        </div>
      </div>

      <div class="hero">
        <div class="pc"><span class="r sp">A</span><span class="s sp">♠</span></div>
        <div class="pc"><span class="r di">Q</span><span class="s di">♦</span></div>
      </div>

      <div class="q">Top pair, top kicker!</div>
      <div class="qs">BB checks to you — what's your move?</div>

      <div class="acts">
        <button class="btn check">Check<small>realise equity</small></button>
        <button class="btn bet">Bet<small>value + protect</small></button>
      </div>

      <div class="chips">
        <span class="schip on"></span><span class="schip on"></span><span class="schip on"></span>
        <span class="schip on"></span><span class="schip"></span>
      </div>
    </div>
  </div>

  <nav>
    <a class="active"><span class="ic">🎮</span>Play</a>
    <a><span class="ic">🎯</span>Leaks</a>
    <a><span class="ic">📥</span>Import</a>
    <a><span class="ic">🏆</span>League</a>
  </nav>
</body>
</html>
