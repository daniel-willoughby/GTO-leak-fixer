<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Open · B Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#080b11;--panel:#0e131c;--line:#1b2433;--line-hi:#2a384c;--txt:#d3dbe8;--dim:#647387;--cyan:#22d3ee;--lime:#a3e635;--amber:#fbbf24;--red:#fb7185;--bet:#2dd4a7;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  .mono{font-family:'JetBrains Mono',monospace;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);min-height:100%;background:radial-gradient(60% 30% at 50% 0%,rgba(34,211,238,.05),transparent 70%),var(--bg);}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.45;background-image:linear-gradient(rgba(27,36,51,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(27,36,51,.6) 1px,transparent 1px);background-size:30px 30px;}
  .wrap{position:relative;max-width:480px;margin:0 auto;padding:0 0 64px;}
  header{position:sticky;top:0;z-index:5;background:rgba(8,11,17,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-weight:700;font-size:15px;}.logo b{color:var(--cyan);}
  .tk{display:flex;gap:16px;}.tk div{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;text-align:right;}.tk div b{display:block;font-family:'JetBrains Mono';font-weight:600;font-size:14px;color:var(--txt);margin-top:2px;}.tk .g b{color:var(--lime);}
  section{padding:14px;}
  .spot{border:1px solid var(--line);border-radius:9px;background:var(--panel);overflow:hidden;}
  .hd{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);background:#0a0f17;}
  .hd .id{font-family:'JetBrains Mono';font-size:11px;color:var(--cyan);}
  .hd .tags span{font-size:9px;font-family:'JetBrains Mono';color:var(--dim);border:1px solid var(--line-hi);border-radius:4px;padding:2px 6px;margin-left:5px;}

  /* table */
  .table{position:relative;aspect-ratio:5/4;margin:6px 4px;}
  .felt{position:absolute;inset:8% 4%;border-radius:50%/46%;background:radial-gradient(circle at 50% 34%,#123a30,#0b2820);border:1px solid #1c4b3d;box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 0 0 6px #0a1016;}
  .felt .mid{position:absolute;inset:0;display:grid;place-items:center;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.18em;color:rgba(45,212,167,.4);}
  .seat{position:absolute;transform:translate(-50%,-50%);}
  .pos{font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--txt);background:#161e2a;border:1px solid var(--line-hi);border-radius:5px;padding:3px 9px;}
  .pos.fold{color:var(--dim);border-style:dashed;text-decoration:line-through;opacity:.6;}
  .pos.hero{color:#04241a;background:linear-gradient(180deg,#34d399,#10b981);border-color:transparent;box-shadow:0 0 14px -2px rgba(45,212,167,.6);}
  .chip{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;}
  .stack{position:relative;width:22px;height:22px;}
  .coin3{position:absolute;left:0;width:22px;height:22px;border-radius:50%;box-shadow:0 2px 3px rgba(0,0,0,.5);}
  .coin3::after{content:'';position:absolute;inset:3px;border-radius:50%;border:1.4px dashed rgba(255,255,255,.6);}
  .blue{background:radial-gradient(circle at 40% 35%,#3b82f6,#1d4ed8);}.amber{background:radial-gradient(circle at 40% 35%,#fbbf24,#d97706);}
  .stack .c1{top:5px;}.stack .c2{top:0;}
  .chip .v{font-family:'JetBrains Mono';font-size:9px;color:#cdd6e4;}
  .dealer{position:absolute;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#e8edf3;color:#0b0f16;font-family:'JetBrains Mono';font-weight:700;font-size:10px;display:grid;place-items:center;box-shadow:0 2px 4px rgba(0,0,0,.5);}
  .hero{position:absolute;left:50%;top:95%;transform:translate(-50%,-50%);display:flex;gap:6px;}
  .pc{width:44px;height:62px;border-radius:6px;background:linear-gradient(180deg,#fbfcfe,#eaeef3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-weight:700;border:1px solid #cad3de;box-shadow:0 4px 10px rgba(0,0,0,.5);}
  .pc .r{font-size:19px;line-height:1;}.pc .s{font-size:15px;line-height:1;}
  .sp{color:#0b0f16;}.di{color:#2563eb;}
  .holding{text-align:center;margin-top:4px;}.holding b{font-family:'JetBrains Mono';color:var(--amber);font-size:13px;}.holding span{color:var(--dim);font-size:11px;}

  .meta{display:flex;border-top:1px solid var(--line);}
  .meta div{flex:1;padding:8px 6px;text-align:center;border-right:1px solid var(--line);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;}
  .meta div:last-child{border-right:none;}.meta div b{display:block;font-family:'JetBrains Mono';font-weight:600;font-size:13px;color:var(--txt);margin-top:3px;}.meta .ok b{color:var(--lime);}

  .panel{margin-top:13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:12px;}
  .ph{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}.ph .r{font-family:'JetBrains Mono';color:var(--bet);text-transform:none;}
  .evbar{display:flex;height:30px;border-radius:6px;overflow:hidden;border:1px solid var(--line);font-family:'JetBrains Mono';font-size:11px;font-weight:600;}
  .evbar .b{background:linear-gradient(180deg,#34d399,#10b981);color:#04241a;display:grid;place-items:center;}.evbar .c{background:#222c3a;color:#9fb0c4;display:grid;place-items:center;}
  .acts{display:grid;grid-template-columns:1fr 1.2fr;gap:10px;margin-top:14px;}
  .btn{border:1px solid;border-radius:7px;padding:14px;font-family:'JetBrains Mono';font-weight:600;font-size:15px;letter-spacing:.04em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;background:transparent;}
  .btn .k{font-size:9px;border:1px solid currentColor;border-radius:3px;padding:1px 5px;opacity:.7;}
  .open{color:var(--bet);border-color:#1f5b48;background:rgba(45,212,167,.08);box-shadow:0 0 18px -8px rgba(45,212,167,.5);}
  .fold{color:#9fb0c4;border-color:#2b3543;background:rgba(148,163,184,.05);}
  nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;border-top:1px solid var(--line);background:rgba(8,11,17,.94);backdrop-filter:blur(10px);display:flex;}
  nav a{flex:1;padding:9px;text-align:center;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono';}nav a .ic{display:block;font-size:15px;margin-bottom:3px;}nav a.on{color:var(--cyan);}
</style></head>
<body><div class="wrap">
  <header><div class="logo">LEAK<b>/</b>TUTOR <span style="color:var(--dim);font-size:10px;font-weight:500">open · rfi</span></div>
    <div class="tk"><div>Hands<b>1,284</b></div><div class="g">Acc<b>71.4%</b></div></div></header>
  <section>
    <div class="spot">
      <div class="hd"><span class="id">NODE · CO_RFI · 6MAX_100bb</span><span class="tags"><span>FOLDED-TO</span></span></div>
      <div class="table">
        <div class="felt"><div class="mid">FOLDED TO HERO</div></div>
        <div class="seat" style="left:9%;top:66%"><div class="pos">BTN</div></div>
        <div class="seat" style="left:8%;top:30%"><div class="pos">SB</div></div>
        <div class="seat" style="left:50%;top:8%"><div class="pos">BB</div></div>
        <div class="seat" style="left:92%;top:30%"><div class="pos fold">UTG</div></div>
        <div class="seat" style="left:91%;top:66%"><div class="pos fold">HJ</div></div>
        <div class="seat" style="left:50%;top:80%"><div class="pos hero">CO</div></div>
        <div class="dealer" style="left:22%;top:60%">D</div>
        <div class="chip" style="left:24%;top:40%"><div class="stack"><div class="coin3 blue c1"></div><div class="coin3 blue c2"></div></div><div class="v">0.5bb</div></div>
        <div class="chip" style="left:50%;top:26%"><div class="stack"><div class="coin3 amber c1"></div><div class="coin3 amber c2"></div></div><div class="v">1bb</div></div>
        <div class="hero"><div class="pc"><span class="r sp">A</span><span class="s sp">♠</span></div><div class="pc"><span class="r di">K</span><span class="s di">♦</span></div></div>
      </div>
      <div class="holding"><b>AKo</b> <span>· premium · in 100% of CO range</span></div>
      <div class="meta"><div>Blinds<b>0.5/1</b></div><div>Stack<b>100bb</b></div><div>To act<b>3</b></div><div class="ok">RFI%<b>27.4</b></div></div>
    </div>
    <div class="panel">
      <div class="ph"><span>GTO · open vs fold</span><span class="r">open 100%</span></div>
      <div class="evbar"><div class="b" style="width:100%">OPEN 2.5bb · +0.92bb</div></div>
    </div>
    <div class="acts">
      <button class="btn fold">FOLD <span class="k">F</span></button>
      <button class="btn open">OPEN 2.5bb <span class="k">R</span></button>
    </div>
  </section>
</div>
<nav><a class="on"><span class="ic">▤</span>Drill</a><a><span class="ic">◎</span>Leaks</a><a><span class="ic">⇪</span>Import</a><a><span class="ic">▦</span>Ranges</a></nav>
</body></html>
