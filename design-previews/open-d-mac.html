<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Open · D Mac</title>
<style>
  :root{
    --accent:#0a84ff;--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--sep:rgba(84,84,88,.55);
    --txt:#f2f2f7;--txt2:#aeaeb2;--txt3:#8e8e93;--green:#30d158;--red:#ff453a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;color:var(--txt);background:var(--bg);min-height:100%;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
  .wrap{max-width:440px;margin:0 auto;padding:0 0 96px;}

  /* iOS large-title nav */
  .nav{position:sticky;top:0;z-index:10;background:rgba(0,0,0,.7);backdrop-filter:blur(20px) saturate(180%);padding:8px 16px 10px;border-bottom:.5px solid var(--sep);}
  .navtop{display:flex;align-items:center;justify-content:space-between;height:28px;}
  .navtop .streak{font-size:14px;color:#ff9f0a;font-weight:600;display:flex;align-items:center;gap:4px;}
  .navtop .gear{color:var(--accent);font-size:20px;}
  .title{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-top:2px;}
  .seg{display:flex;background:rgba(118,118,128,.24);border-radius:9px;padding:2px;margin-top:10px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--txt);font:inherit;font-size:13px;font-weight:600;padding:6px 0;border-radius:7px;}
  .seg button.on{background:var(--bg3);box-shadow:0 1px 3px rgba(0,0,0,.4),0 0 0 .5px rgba(255,255,255,.06);}
  .seg button:not(.on){color:var(--txt2);font-weight:500;}

  .pad{padding:18px 16px 0;}
  .grouphdr{font-size:13px;color:var(--txt3);text-transform:uppercase;letter-spacing:.02em;margin:0 6px 8px;}

  /* table card */
  .card{background:var(--bg2);border-radius:18px;padding:14px;box-shadow:0 0 0 .5px rgba(255,255,255,.05);}
  .table{position:relative;aspect-ratio:5/4;}
  .felt{position:absolute;inset:8% 4%;border-radius:50%/46%;background:radial-gradient(circle at 50% 34%,#0e3b2e,#08251c);border:1px solid #14483a;box-shadow:inset 0 0 36px rgba(0,0,0,.55);}
  .felt .mid{position:absolute;inset:0;display:grid;place-items:center;font-size:11px;letter-spacing:.12em;color:rgba(48,209,88,.45);font-weight:600;}
  .seat{position:absolute;transform:translate(-50%,-50%);}
  .pos{font-size:12px;font-weight:600;color:var(--txt);background:rgba(118,118,128,.4);border-radius:999px;padding:3px 11px;}
  .pos.fold{color:var(--txt3);background:rgba(118,118,128,.18);text-decoration:line-through;}
  .pos.hero{background:var(--accent);color:#fff;box-shadow:0 0 14px -2px rgba(10,132,255,.7);}
  .chip{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;}
  .stack{position:relative;width:22px;height:22px;}
  .coin3{position:absolute;left:0;width:22px;height:22px;border-radius:50%;box-shadow:0 2px 3px rgba(0,0,0,.5);}
  .coin3::after{content:'';position:absolute;inset:3px;border-radius:50%;border:1.4px dashed rgba(255,255,255,.7);}
  .blue{background:radial-gradient(circle at 40% 35%,#409cff,#0a84ff);}.orange{background:radial-gradient(circle at 40% 35%,#ffb340,#ff9f0a);}
  .stack .c1{top:5px;}.stack .c2{top:0;}
  .chip .v{font-size:9px;color:var(--txt2);font-weight:600;}
  .dealer{position:absolute;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;color:#1c1c1e;font-size:11px;font-weight:700;display:grid;place-items:center;box-shadow:0 2px 4px rgba(0,0,0,.5);}
  .hero{position:absolute;left:50%;top:95%;transform:translate(-50%,-50%);display:flex;gap:7px;}
  .pc{width:50px;height:70px;border-radius:9px;background:linear-gradient(180deg,#fff,#f0f1f3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;box-shadow:0 6px 14px rgba(0,0,0,.5);}
  .pc .r{font-size:23px;line-height:1;}.pc .s{font-size:18px;line-height:1;margin-top:1px;}
  .sp{color:#1b1c1e;}.di{color:#1d6fe0;}

  .holding{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:12px 14px;background:var(--bg2);border-radius:14px;box-shadow:0 0 0 .5px rgba(255,255,255,.05);}
  .holding .l b{font-size:16px;font-weight:600;}.holding .l span{display:block;font-size:13px;color:var(--txt2);margin-top:2px;}
  .holding .pct{font-size:15px;font-weight:600;color:var(--green);}

  .actions{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
  .btn{height:50px;border-radius:14px;font:inherit;font-size:17px;font-weight:600;border:none;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
  .btn.fill{background:var(--accent);color:#fff;box-shadow:0 8px 22px -10px rgba(10,132,255,.9);}
  .btn.tint{background:rgba(118,118,128,.24);color:var(--txt);}
  .btn .k{font-size:12px;opacity:.7;font-weight:500;}

  .tabbar{position:fixed;bottom:0;left:0;right:0;max-width:440px;margin:0 auto;background:rgba(0,0,0,.7);backdrop-filter:blur(20px) saturate(180%);border-top:.5px solid var(--sep);display:flex;padding-bottom:env(safe-area-inset-bottom);}
  .tabbar a{flex:1;padding:8px 0 6px;text-align:center;font-size:10px;color:var(--txt3);}
  .tabbar a .ic{display:block;font-size:20px;margin-bottom:2px;}
  .tabbar a.on{color:var(--accent);}
</style></head>
<body><div class="wrap">
  <div class="nav">
    <div class="navtop"><div class="streak">🔥 12-day</div><div class="gear">⚙︎</div></div>
    <div class="title">Open</div>
    <div class="seg"><button class="on">Open</button><button>vs Raise</button><button>Multiway</button><button>Postflop</button></div>
  </div>

  <div class="pad">
    <div class="grouphdr">Cutoff · 100bb · folded to you</div>
    <div class="card">
      <div class="table">
        <div class="felt"><div class="mid">FOLDED TO YOU</div></div>
        <div class="seat" style="left:9%;top:66%"><div class="pos">BTN</div></div>
        <div class="seat" style="left:8%;top:30%"><div class="pos">SB</div></div>
        <div class="seat" style="left:50%;top:8%"><div class="pos">BB</div></div>
        <div class="seat" style="left:92%;top:30%"><div class="pos fold">UTG</div></div>
        <div class="seat" style="left:91%;top:66%"><div class="pos fold">HJ</div></div>
        <div class="seat" style="left:50%;top:80%"><div class="pos hero">CO</div></div>
        <div class="dealer" style="left:22%;top:60%">D</div>
        <div class="chip" style="left:24%;top:40%"><div class="stack"><div class="coin3 blue c1"></div><div class="coin3 blue c2"></div></div><div class="v">0.5bb</div></div>
        <div class="chip" style="left:50%;top:26%"><div class="stack"><div class="coin3 orange c1"></div><div class="coin3 orange c2"></div></div><div class="v">1bb</div></div>
        <div class="hero"><div class="pc"><span class="r sp">A</span><span class="s sp">♠</span></div><div class="pc"><span class="r di">K</span><span class="s di">♦</span></div></div>
      </div>
    </div>

    <div class="holding"><div class="l"><b>A♠ K♦ · Ace-King offsuit</b><span>Premium hand · always opens from the cutoff</span></div><div class="pct">100%</div></div>

    <div class="actions">
      <button class="btn fill">Open to 2.5bb <span class="k">return</span></button>
      <button class="btn tint">Fold <span class="k">F</span></button>
    </div>
  </div>
</div>
<div class="tabbar">
  <a class="on"><span class="ic">♠</span>Drill</a><a><span class="ic">◎</span>Leaks</a><a><span class="ic">⤓</span>Import</a><a><span class="ic">✦</span>Learn</a>
</div>
</body></html>
